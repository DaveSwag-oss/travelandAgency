<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account | Trevland</title>
    <link href="https://fonts.googleapis.com/css2?family=Gelasio:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('img/nebo.svg') center/cover no-repeat;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .profile-container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 50px;
            border-radius: 40px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .avatar-large {
            width: 100px;
            height: 100px;
            background: #e15d56;
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            box-shadow: 0 0 20px rgba(225, 93, 86, 0.5);
        }

        h1 { font-family: 'Gelasio', serif; font-size: 32px; margin-bottom: 5px; }
        .email-label { opacity: 0.7; font-size: 14px; margin-bottom: 30px; }

        .stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item h3 { color: #e15d56; font-size: 20px; }
        .stat-item p { font-size: 12px; opacity: 0.8; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; }

        .btn-profile {
            padding: 12px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            text-decoration: none;
        }

        .btn-home { background: #fff; color: #333; }
        .btn-home:hover { background: #e15d56; color: #fff; }

        .btn-logout { background: transparent; border: 1px solid #e15d56; color: #e15d56; }
        .btn-logout:hover { background: #e15d56; color: #fff; }

        .profile-dashboard {
    display: flex;
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(15px);
    border-radius: 24px;
    border: 1px solid rgba(255, 255, 255, 0.1);
    width: 90%;
    max-width: 1000px;
    min-height: 500px;
    overflow: hidden;
    color: white;
}

.profile-sidebar {
    width: 250px;
    background: rgba(0, 0, 0, 0.2);
    padding: 30px 20px;
    border-right: 1px solid rgba(255, 255, 255, 0.1);
}

.nav-btn {
    width: 100%;
    padding: 12px 15px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    text-align: left;
    cursor: pointer;
    border-radius: 10px;
    margin-bottom: 5px;
    transition: 0.3s;
}

.nav-btn.active, .nav-btn:hover {
    background: rgba(225, 93, 86, 0.2);
    color: #e15d56;
}

.profile-content {
    flex: 1;
    padding: 40px;
}

.tab-content { display: none; }
.tab-content.active { display: block; animation: fadeIn 0.5s; }

.info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
.info-item span { font-size: 12px; opacity: 0.5; text-transform: uppercase; }
.info-item p { font-size: 16px; margin-top: 5px; }

.empty-state { text-align: center; padding: 50px 0; }
.empty-icon { font-size: 50px; margin-bottom: 10px; }
.explore-btn { display: inline-block; margin-top: 15px; padding: 10px 20px; background: #e15d56; color: white; border-radius: 30px; text-decoration: none; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.bookings-grid {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
}

.booking-card {
    background: rgba(255, 255, 255, 0.07);
    border-radius: 18px;
    padding: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border: 1px solid rgba(255, 255, 255, 0.1);
    transition: 0.3s;
}

.booking-card:hover {
    background: rgba(255, 255, 255, 0.12);
    transform: scale(1.02);
}

.trip-info h4 {
    margin: 0;
    font-size: 18px;
    color: #fff;
}

.trip-details {
    font-size: 13px;
    opacity: 0.6;
    margin-top: 5px;
}

.trip-price {
    font-size: 20px;
    font-weight: bold;
    color: #4CAF50;
}

.status-badge {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 11px;
    background: rgba(76, 175, 80, 0.2);
    color: #4CAF50;
    margin-top: 8px;
    display: inline-block;
}
body.dark-mode {
    background-color: #121212 !important; /* Черный фон страницы */
    color: #ffffff !important;            /* Белый текст */
}

/* Принудительно красим заголовки, параграфы и ссылки на всех страницах */
body.dark-mode h1, 
body.dark-mode h2, 
body.dark-mode h3, 
body.dark-mode h4, 
body.dark-mode p, 
body.dark-mode span,
body.dark-mode li {
    color: #ffffff !important;
}

/* Убираем белые фоны у секций и контейнеров */
body.dark-mode section, 
body.dark-mode div:not(.header-pill) {
    background-color: transparent !important;
}
/* --- АДАПТИВ ДЛЯ ПРОФИЛЯ --- */
@media (max-width: 768px) {
    body {
        padding: 20px 10px;
        align-items: flex-start; /* Чтобы на мобилках контент не обрезался сверху */
    }

    .profile-dashboard {
        flex-direction: column; /* Сайдбар сверху, контент снизу */
        width: 100%;
        min-height: auto;
        border-radius: 20px;
    }

    .profile-sidebar {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding: 20px;
        text-align: center;
    }

    .back-home-link {
        justify-content: center; /* Центрируем кнопку "Назад" */
        margin-bottom: 20px;
    }

    .profile-nav {
        display: flex;
        flex-wrap: wrap; /* Кнопки навигации в ряд, если не влезают — переносятся */
        justify-content: center;
        gap: 5px;
    }

    .nav-btn {
        width: auto; /* Кнопки не на всю ширину */
        font-size: 13px;
        padding: 8px 12px;
        margin-bottom: 0;
    }

    .profile-content {
        padding: 25px 15px;
    }

    /* Сетка информации в профиле */
    .info-grid {
        grid-template-columns: 1fr; /* Поля ввода одно под другим */
        gap: 15px;
    }

    h2 {
        font-size: 22px;
        text-align: center;
    }

    /* Карточки бронирований */
    .booking-card {
        flex-direction: column; /* Текст и цена друг под другом */
        text-align: center;
        gap: 15px;
    }

    .trip-price {
        font-size: 18px;
    }
}

/* Уточнение для очень маленьких экранов (телефоны) */
@media (max-width: 480px) {
    .profile-nav {
        display: grid;
        grid-template-columns: 1fr 1fr; /* Навигация по 2 кнопки в ряд */
    }
    
    .logout-btn {
        grid-column: span 2; /* Кнопка выхода на всю ширину */
        color: #ff5f56 !important;
    }
}
    </style>
</head>
<body>
    <div class="profile-dashboard" data-aos="fade-up">
        <div class="profile-sidebar">
            <a href="index.html" class="back-home-link" style="color: #fca311 !important; text-decoration: none !important; display: flex !important; align-items: center !important; gap: 8px; margin-bottom: 30px;">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fca311" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
    Back to Home
</a>
            <div class="user-info-brief">
                <h3 id="side-name">User Name</h3>
            </div>
            <nav class="profile-nav">
                <button class="nav-btn active" onclick="showTab('personal-info')">👤 Personal Info</button>
                <button class="nav-btn" onclick="showTab('bookings')">✈️ My Bookings</button>
                <button class="nav-btn" onclick="showTab('settings')">⚙️ Settings</button>
                <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
                <button class="nav-btn logout-btn" onclick="logout()">Logout Account</button>
            </nav>
        </div>

        <div class="profile-content">
            
            <div id="personal-info" class="tab-content active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
                    <h2 style="margin:0;">Personal Information</h2>
                    <button id="edit-profile-btn" class="nav-btn" style="width: auto; padding: 5px 15px; border: 1px solid #e15d56; margin:0;" onclick="toggleEditProfile()">Edit Profile</button>
                </div>

                <div class="info-grid" id="profile-display">
                    <div class="info-item"><span>Full Name</span><p id="p-name">Loading...</p></div>
                    <div class="info-item"><span>Email Address</span><p id="p-email">Loading...</p></div>
                    <div class="info-item"><span>Phone Number</span><p id="p-phone">Not provided</p></div>
                </div>

                <div id="profile-edit-form" class="info-grid" style="display: none;">
                    <div class="info-item">
                        <span>Full Name</span>
                        <input type="text" id="edit-fname" style="width:100%; padding:8px; background:rgba(255,255,255,0.1); border:1px solid #555; border-radius:8px; color:white;">
                    </div>
                    <div class="info-item">
                        <span>Email Address</span>
                        <input type="email" id="edit-email" style="width:100%; padding:8px; background:rgba(255,255,255,0.1); border:1px solid #555; border-radius:8px; color:white;">
                    </div>
                    <div class="info-item">
                        <span>Phone Number</span>
                        <input type="text" id="edit-phone" style="width:100%; padding:8px; background:rgba(255,255,255,0.1); border:1px solid #555; border-radius:8px; color:white;">
                    </div>
                    <div style="grid-column: 1 / -1; margin-top: 20px;">
                        <button class="nav-btn active" style="width: auto; display: inline-block; background:#e15d56;" onclick="saveProfileChanges()">Save Changes</button>
                    </div>
                </div>
            </div>

            <div id="bookings" class="tab-content">
                <h2>My Bookings</h2>
                <div id="bookings-list" class="bookings-grid">
                    <p style="opacity: 0.5;">No active bookings yet.</p>
                </div>
            </div>

            <div id="settings" class="tab-content">
                <h2>Account Settings</h2>
                <p style="opacity: 0.7; margin-bottom: 20px;">Manage your preferences and security here.</p>
                <div style="display: flex; flex-direction: column; gap: 10px; max-width: 250px;">
                    <button class="nav-btn" style="border: 1px solid rgba(255,255,255,0.2);" onclick="changePassword()">Change Password</button>
                    <button class="nav-btn" style="border: 1px solid rgba(255,255,255,0.2); color: #ff5f56;" onclick="deleteAccount()">Delete Account</button>
                </div>
            </div>

        </div>
    </div>
</body>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    // 1. Глобальные функции (чтобы кнопки их видели всегда)
    function showTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
        
        const targetTab = document.getElementById(tabId);
        if (targetTab) targetTab.classList.add('active');
        if (event) event.currentTarget.classList.add('active');
    }

    function toggleEditProfile() {
        const display = document.getElementById('profile-display');
        const form = document.getElementById('profile-edit-form');
        const btn = document.getElementById('edit-profile-btn');

        if (!display || !form) return;

        if (form.style.display === 'none' || form.style.display === '') {
            display.style.display = 'none';
            form.style.display = 'grid';
            btn.innerText = 'Cancel';
            
            // Предзаполняем инпуты из текущих данных на странице
            const user = JSON.parse(localStorage.getItem('user')) || {};
            if(document.getElementById('edit-fname')) document.getElementById('edit-fname').value = user.name || '';
            if(document.getElementById('edit-email')) document.getElementById('edit-email').value = user.email || '';
            if(document.getElementById('edit-phone')) document.getElementById('edit-phone').value = user.phone || '';
        } else {
            display.style.display = 'grid';
            form.style.display = 'none';
            btn.innerText = 'Edit Profile';
        }
    }

    function saveProfileChanges() {
    const newName = document.getElementById('edit-fname').value;
    const newEmail = document.getElementById('edit-email').value;
    const newPhone = document.getElementById('edit-phone').value;

    const userData = {
        name: newName,
        email: newEmail,
        phone: newPhone
    };

    localStorage.setItem('user', JSON.stringify(userData));
    
    // Обновляем текст на странице вручную
    document.getElementById('p-name').innerText = newName;
    document.getElementById('p-email').innerText = newEmail;
    document.getElementById('p-phone').innerText = newPhone || 'Not provided';
    document.getElementById('side-name').innerText = newName;

    alert('Profile updated!'); // Теперь это вызовет оранжевое окно
    toggleEditProfile(); // Закроет форму редактирования
}
    function logout() {
        localStorage.removeItem('isLoggedIn');
        // myTrips лучше оставить, чтобы при новом входе они были, 
        // но если хочешь полную очистку — используй localStorage.clear();
        window.location.href = 'index.html';
    }

    // 2. Инициализация при загрузке
    document.addEventListener('DOMContentLoaded', () => {
        const user = JSON.parse(localStorage.getItem('user'));
        const isLoggedIn = localStorage.getItem('isLoggedIn');

        if (!user || isLoggedIn !== 'true') {
            window.location.replace('index.html');
            return;
        }

        // Заполняем текстовые поля (проверяем наличие ID)
        if(document.getElementById('side-name')) document.getElementById('side-name').innerText = user.name;
        if(document.getElementById('p-name')) document.getElementById('p-name').innerText = user.name;
        if(document.getElementById('p-email')) document.getElementById('p-email').innerText = user.email;
        if(document.getElementById('p-phone')) document.getElementById('p-phone').innerText = user.phone || 'Not provided';
        if(document.getElementById('user-initials')) document.getElementById('user-initials').innerText = user.name[0].toUpperCase();

        // Рендерим туры (только если есть данные)
        const myTrips = JSON.parse(localStorage.getItem('myTrips')) || [];
        const bookingsList = document.getElementById('bookings-list');

        if (bookingsList && myTrips.length > 0) {
            bookingsList.innerHTML = ''; 
            myTrips.forEach(trip => {
                bookingsList.innerHTML += `
                    <div class="booking-card" style="background:rgba(255,255,255,0.05); padding:15px; border-radius:15px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h4 style="margin:0;">📍 ${trip.destination}</h4>
                            <small style="opacity:0.6;">Date: ${trip.date}</small>
                        </div>
                        <b style="color:#e15d56;">$${trip.price}</b>
                        <span class="status-badge" style="
     font-size: 11px; 
    padding: 4px 10px; 
    border-radius: 20px; 
    background: rgba(252, 163, 17, 0.2); 
    color: #fca311; 
    border: 1px solid #fca311;
    margin-top: 5px;
    display: inline-block;
">Stage: Processing</span>
                    </div>
                `;
            });
        }
        
        AOS.init({ duration: 800, once: true });
    });
let currentAction = ""; // Глобальная переменная для отслеживания действия

function changePassword() {
    currentAction = "password";
    const modal = document.getElementById('custom-alert');
    const input = document.getElementById('modal-input');
    
    document.getElementById('modal-title').innerText = "Change Password";
    document.getElementById('modal-message').innerText = "Enter your new password:";
    
    input.style.display = "block";
    input.value = "";
    modal.style.display = "flex";
}

function deleteAccount() {
    currentAction = "delete";
    const modal = document.getElementById('custom-alert');
    
    document.getElementById('modal-title').innerText = "Delete Account";
    document.getElementById('modal-message').innerText = "Are you sure? All data will be lost.";
    
    document.getElementById('modal-input').style.display = "none";
    modal.style.display = "flex";
}

function handleModalConfirm() {
    const input = document.getElementById('modal-input');
    const msg = document.getElementById('modal-message');

    if (currentAction === "alert") {
        closeModal(); // Если это просто алерт, просто закрываем
    } 
    else if (currentAction === "password") {
        const newPass = input.value.trim();
        if (newPass.length >= 6) {
            let user = JSON.parse(localStorage.getItem('user')) || {};
            user.password = newPass;
            localStorage.setItem('user', JSON.stringify(user));
            
            msg.style.color = "#4CAF50";
            msg.innerText = "✨ Password changed!";
            input.style.display = "none";
            setTimeout(closeModal, 1500);
        } else {
            msg.style.color = "#ff5f56";
            msg.innerText = "Error: Min 6 characters!";
        }
    } 
    else if (currentAction === "delete") {
        localStorage.clear();
        msg.innerText = "🚀 Account deleted!";
        setTimeout(() => { window.location.href = 'index.html'; }, 2000);
    }
}
// ПЕРЕХВАТ АЛЕРТОВ (Ловит все alert и отправляет в нашу модалку)
window.alert = function(message) {
    currentAction = "alert"; // Ставим статус обычного уведомления
    const modal = document.getElementById('custom-alert');
    const input = document.getElementById('modal-input');
    const confirmBtn = document.getElementById('btn-modal-confirm');
    const cancelBtn = document.getElementById('btn-modal-cancel');

    document.getElementById('modal-title').innerText = "System Message";
    document.getElementById('modal-message').innerText = message;
    document.getElementById('modal-message').style.color = "white";

    input.style.display = "none";     // Прячем ввод
    cancelBtn.style.display = "none"; // Прячем Cancel
    
    confirmBtn.innerText = "OK";      // Меняем текст на OK
    confirmBtn.style.display = "block";
    
    modal.style.display = "flex";
};

function closeModal() {
    document.getElementById('custom-alert').style.display = 'none';
    document.getElementById('modal-input').style.display = 'none';
    // Возвращаем кнопки в исходное состояние
    document.getElementById('btn-modal-confirm').innerText = "Confirm";
    document.getElementById('btn-modal-confirm').style.display = "block";
    document.getElementById('btn-modal-cancel').style.display = "block";
    currentAction = "";
}
const themeBtn = document.getElementById('theme-toggle');
    const body = document.body;

    // 1. ПРОВЕРКА: Если пользователь уже выбирал темную тему раньше — включаем её сразу
    if (localStorage.getItem('theme') === 'dark') {
        body.classList.add('dark-mode');
        if (themeBtn) themeBtn.innerText = '☀️';
    }

    // 2. КЛИК: Переключение и сохранение
    if (themeBtn) {
        themeBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            
            body.classList.toggle('dark-mode');

            // Проверяем, что в итоге получилось, и записываем в память
            if (body.classList.contains('dark-mode')) {
                localStorage.setItem('theme', 'dark'); // Запомнили: ночь
                themeBtn.innerText = '☀️';
            } else {
                localStorage.setItem('theme', 'light'); // Запомнили: день
                themeBtn.innerText = '🌙';
            }
        });
    }
</script>
<div id="custom-alert" style="display:none; position:fixed; z-index:999999; left:0; top:0; width:100%; height:100%; background:rgba(0,0,0,0.8); backdrop-filter:blur(10px); align-items:center; justify-content:center;">
    <div style="background:#1a1a1a; color:white; padding:35px; width:90%; max-width:400px; border-radius:25px; border:2px solid #fca311; text-align:center; box-shadow: 0 10px 40px rgba(0,0,0,0.6);">
        <div id="modal-icon" style="font-size:45px; margin-bottom:15px;">⚙️</div>
        <h3 id="modal-title" style="margin-bottom:10px; color:#fca311;">System Action</h3>
        <p id="modal-message" style="font-size:16px; margin-bottom:20px; opacity:0.8;"></p>
        
        <input type="password" id="modal-input" placeholder="Enter here..." style="display:none; width:100%; padding:12px; margin-bottom:20px; background:rgba(255,255,255,0.1); border:1px solid #fca311; border-radius:10px; color:white; outline:none;">
        
        <div style="display:flex; gap:10px; margin-top: 20px;">
    <button type="button" id="btn-modal-cancel" onclick="closeModal()" style="flex:1; padding:12px; background:transparent; border:1px solid #444; border-radius:12px; color:white; cursor:pointer;">Cancel</button>
    
    <button type="button" id="btn-modal-confirm" onclick="handleModalConfirm()" style="flex:1; padding:12px; background:#fca311; border:none; border-radius:12px; color:black; font-weight:bold; cursor:pointer;">Confirm</button>
</div>
    </div>
</div>
</body>
</html>
